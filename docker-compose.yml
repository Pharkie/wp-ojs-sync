# Base compose file — used by both local dev and staging.
# Local dev:  docker compose up -d  (auto-loads docker-compose.override.yml)
# Staging:    docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  wp:
    build:
      context: .
      dockerfile: docker/wp/Dockerfile
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: wp-db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      WORDPRESS_DB_NAME: wordpress
      WPOJS_BASE_URL: ${WPOJS_BASE_URL:-http://ojs:80/index.php/journal}
    volumes:
      - ./wordpress:/var/www/html
      - ./plugins/wpojs-sync:/var/www/html/web/app/plugins/wpojs-sync
      - wp_uploads:/var/www/html/web/app/uploads
      - ./.env:/var/www/html/.env:ro
      - ./scripts:/var/www/html/scripts:ro
      - ./docker/test-users.csv:/data/test-users.csv:ro
    depends_on:
      wp-db:
        condition: service_healthy
    networks:
      - sea-net

  wp-db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${WP_DB_PASSWORD}
    volumes:
      - wp_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sea-net

  ojs:
    build:
      context: .
      dockerfile: docker/ojs/Dockerfile  # Extends pkpofficial/ojs:3_5_0-3 — adds gettext for envsubst
    restart: unless-stopped
    entrypoint: /etc/ojs/entrypoint.sh
    environment:
      OJS_DB_HOST: ojs-db
      OJS_DB_USER: ojs
      OJS_DB_PASSWORD: ${OJS_DB_PASSWORD}
      OJS_DB_NAME: ojs
      OJS_CLI_INSTALL: "0"
      OJS_BASE_URL: ${OJS_BASE_URL:-http://localhost:8081}
      OJS_TIMEZONE: ${OJS_TIMEZONE:-Europe/London}
      OJS_ADMIN_USER: ${OJS_ADMIN_USER:-admin}
      OJS_ADMIN_PASSWORD: ${OJS_ADMIN_PASSWORD:-admin123}
      OJS_ADMIN_EMAIL: ${OJS_ADMIN_EMAIL:-admin@example.com}
      WPOJS_API_KEY_SECRET: ${WPOJS_API_KEY_SECRET:-dev-api-key-local}
      WPOJS_ALLOWED_IPS: ${WPOJS_ALLOWED_IPS:-172.0.0.0/8}
      WPOJS_WP_MEMBER_URL: ${WPOJS_WP_MEMBER_URL:-http://localhost:8080}
      WPOJS_SUPPORT_EMAIL: ${WPOJS_SUPPORT_EMAIL:-}
      # UI messages (entrypoint.sh provides generic defaults if not set)
      WPOJS_DEFAULT_LOGIN_HINT: ${WPOJS_DEFAULT_LOGIN_HINT:-}
      WPOJS_DEFAULT_PAYWALL_HINT: ${WPOJS_DEFAULT_PAYWALL_HINT:-}
      WPOJS_DEFAULT_FOOTER_MESSAGE: ${WPOJS_DEFAULT_FOOTER_MESSAGE:-}
      # Journal metadata (used by setup-ojs.sh)
      OJS_JOURNAL_PATH: ${OJS_JOURNAL_PATH:-journal}
      OJS_JOURNAL_NAME: ${OJS_JOURNAL_NAME:-}
      OJS_JOURNAL_ACRONYM: ${OJS_JOURNAL_ACRONYM:-}
      OJS_JOURNAL_CONTACT_NAME: ${OJS_JOURNAL_CONTACT_NAME:-}
      OJS_JOURNAL_CONTACT_EMAIL: ${OJS_JOURNAL_CONTACT_EMAIL:-}
      OJS_JOURNAL_PUBLISHER: ${OJS_JOURNAL_PUBLISHER:-}
      OJS_JOURNAL_PUBLISHER_URL: ${OJS_JOURNAL_PUBLISHER_URL:-}
      OJS_JOURNAL_PRINT_ISSN: ${OJS_JOURNAL_PRINT_ISSN:-}
      OJS_JOURNAL_ONLINE_ISSN: ${OJS_JOURNAL_ONLINE_ISSN:-}
      OJS_JOURNAL_COUNTRY: ${OJS_JOURNAL_COUNTRY:-}
      OJS_JOURNAL_DESCRIPTION: ${OJS_JOURNAL_DESCRIPTION:-}
      OJS_JOURNAL_ABOUT: ${OJS_JOURNAL_ABOUT:-}
      OJS_JOURNAL_SUBSCRIPTION_INFO: ${OJS_JOURNAL_SUBSCRIPTION_INFO:-}
      OJS_SUB_TYPES: ${OJS_SUB_TYPES:-}
      OJS_PURCHASE_ARTICLE_FEE: ${OJS_PURCHASE_ARTICLE_FEE:-0}
      OJS_PURCHASE_ISSUE_FEE: ${OJS_PURCHASE_ISSUE_FEE:-0}
      OJS_SMTP_ENABLED: ${OJS_SMTP_ENABLED:-Off}
      OJS_SMTP_HOST: ${OJS_SMTP_HOST:-}
      OJS_SMTP_PORT: ${OJS_SMTP_PORT:-587}
      OJS_SMTP_AUTH: ${OJS_SMTP_AUTH:-tls}
      OJS_SMTP_USER: ${OJS_SMTP_USER:-}
      OJS_SMTP_PASSWORD: ${OJS_SMTP_PASSWORD:-}
      OJS_MAIL_FROM: ${OJS_MAIL_FROM:-noreply@localhost}
    volumes:
      - ojs_data:/var/www/html
      - ojs_files:/var/www/files
      - ./plugins/wpojs-subscription-api:/var/www/html/plugins/generic/wpojsSubscriptionApi
      - ./plugins/wpojs-subscription-api/api/v1/wpojs:/var/www/html/api/v1/wpojs:ro
      - ./docker/ojs/entrypoint.sh:/etc/ojs/entrypoint.sh:ro
      - ./docker/ojs/config.inc.php.tmpl:/etc/ojs/config.inc.php.tmpl:ro
      - ./docker/ojs/php-overrides.ini:/usr/local/etc/php/conf.d/zz-overrides.ini:ro
      - ./docker/ojs/apache.conf:/etc/apache2/conf-enabled/sea-cgipassauth.conf:ro
      - ./scripts:/scripts:ro
      - "./data export/ojs-import-clean.xml:/data/ojs-import-clean.xml:ro"
    depends_on:
      ojs-db:
        condition: service_healthy
    networks:
      - sea-net

  ojs-db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${OJS_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ojs
      MYSQL_USER: ojs
      MYSQL_PASSWORD: ${OJS_DB_PASSWORD}
    volumes:
      - ojs_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sea-net

volumes:
  wp_uploads:
  wp_db_data:
  ojs_data:
  ojs_files:
  ojs_db_data:

networks:
  sea-net:
    driver: bridge
