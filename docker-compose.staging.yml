# Staging/prod overrides — IP-only mode (no SSL).
# For SSL with domains, add docker-compose.caddy.yml on top:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml -f docker-compose.caddy.yml up -d
#
# Usage (IP-only): docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  wp:
    ports:
      - "8080:80"
    environment:
      WP_ENV: staging

  ojs:
    ports:
      - "8081:80"
    environment:
      OJS_SMTP_ENABLED: ${OJS_SMTP_ENABLED:-On}

  adminer:
    ports:
      - "127.0.0.1:8082:8080"
